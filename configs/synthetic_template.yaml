run_name: "__RUN_NAME__"
output_dir: "__OUTPUT_DIR__"

target_total_tokens: __TARGET_TOKENS__

backend:
  provider: "groq"
  model: "__MODEL__"
  max_tokens: __MAX_TOKENS__
  temperature: __TEMPERATURE__
  top_p: __TOP_P__
  parallel_requests: __CONCURRENCY__

mix:
  arithmetic:
    share: 0.30
    prompt_file: "prompts/arithmetic.yaml"
    source_module: "slm_synth.sources.arithmetic"
  task_code:
    share: 0.30
    prompt_file: "prompts/task_code.yaml"
    source_module: "slm_synth.sources.task_code"
  educational_qa_mcq:
    share: 0.30
    prompt_file: "prompts/educational_qa_mcq.yaml"
    source_module: "slm_synth.sources.educational_qa_mcq"
  factual_restraint:
    share: 0.10
    prompt_file: "prompts/factual_restraint.yaml"
    source_module: "slm_synth.sources.factual_restraint"

validation:
  schema: true
  max_retries: 2
  reject_on:
    - empty_output
    - schema_violation
    - unsafe_content
    - hallucinated_facts

dedup:
  enable_exact: true
  enable_fuzzy: true
  fuzzy_method: "minhash"
  minhash_threshold: 0.85

export:
  push_to_hf: true
  hf_repo: "__HF_REPO__"
  private: false
  include_manifests: true

rate_limit:
  delay_ms: 40
  jitter_ms: 20
  max_concurrency: __CONCURRENCY__
  backoff:
    initial_ms: 500
    max_ms: 4000
    multiplier: 2.0

generation:
  samples_per_signal: __SAMPLES_PER_SIGNAL__
  batch_size: __batch_size__
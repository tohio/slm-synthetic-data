run_name: "__RUN_NAME__"
output_dir: "__OUTPUT_DIR__"

target_total_tokens: __TARGET_TOKENS__

backend:
  provider: "groq"
  model: "__MODEL__"
  max_tokens: __MAX_TOKENS__
  temperature: __TEMPERATURE__
  top_p: __TOP_P__
  parallel_requests: __CONCURRENCY__
  json_mode: true
  service_tier: "__SERVICE_TIER__"
  request_timeout_seconds: 120
  retries:
    max_request_retries: 12
    retry_sleep_seconds: 0.5
    retry_backoff_initial_seconds: 1.0
    retry_backoff_max_seconds: 45.0
    retry_backoff_multiplier: 2.0
    retry_jitter_ratio: 0.35

mix:
  arithmetic:
    share: 0.30
    prompt_file: "prompts/arithmetic.yaml"
    source_module: "slm_synth.sources.arithmetic"
    model: "llama-3.1-8b-instant"
    batch_size: __ARITHMETIC_BATCH_SIZE__
    parallel_requests: __CONCURRENCY__
    max_tokens: __ARITHMETIC_MAX_TOKENS__
    avg_tokens_per_sample: 60
  task_code:
    share: 0.30
    prompt_file: "prompts/task_code.yaml"
    source_module: "slm_synth.sources.task_code"
    model: "llama-3.1-8b-instant"
    batch_size: __TASK_CODE_BATCH_SIZE__
    parallel_requests: __CONCURRENCY__
    max_tokens: __TASK_CODE_MAX_TOKENS__
    avg_tokens_per_sample: 160
    max_rejected_batches: 2000
  educational_qa_mcq:
    share: 0.30
    prompt_file: "prompts/educational_qa_mcq.yaml"
    source_module: "slm_synth.sources.educational_qa_mcq"
    model: "llama-3.1-8b-instant"
    batch_size: __EDUCATIONAL_QA_MCQ_BATCH_SIZE__
    parallel_requests: __CONCURRENCY__
    max_tokens: __EDUCATIONAL_QA_MCQ_MAX_TOKENS__
    avg_tokens_per_sample: 100
  factual_restraint:
    share: 0.10
    prompt_file: "prompts/factual_restraint.yaml"
    source_module: "slm_synth.sources.factual_restraint"
    model: "llama-3.1-8b-instant"
    batch_size: __FACTUAL_RESTRAINT_BATCH_SIZE__
    parallel_requests: __CONCURRENCY__
    max_tokens: __FACTUAL_RESTRAINT_MAX_TOKENS__
    avg_tokens_per_sample: 90

validation:
  schema: true
  max_retries: 2
  reject_on:
    - empty_output
    - schema_violation
    - unsafe_content
    - hallucinated_facts

dedup:
  enable_exact: true
  enable_fuzzy: true
  fuzzy_method: "minhash"
  minhash_threshold: 0.85

export:
  push_to_hf: true
  hf_repo: "__HF_REPO__"
  private: false
  include_manifests: true

rate_limit:
  delay_ms: 125
  jitter_ms: 125
  max_concurrency: __CONCURRENCY__
  backoff:
    initial_ms: 500
    max_ms: 45000
    multiplier: 2.0
    jitter_ratio: 0.35

generation:
  batch_size: __BATCH_SIZE__
  min_batch_size: 1
  avg_tokens_per_sample: __AVG_TOKENS_PER_SAMPLE__
  max_rejected_batches: 1000

run_name: "__RUN_NAME__"
output_dir: "__OUTPUT_DIR__"

target_total_tokens: __TARGET_TOKENS__

backend:
  provider: "openrouter"
  model: "__MODEL__"
  max_tokens: __MAX_TOKENS__
  temperature: __TEMPERATURE__
  top_p: __TOP_P__
  json_mode: true
  request_timeout_seconds: 300
  require_parameters: true
  allow_fallbacks: false
  parallel_requests: __CONCURRENCY__
  retries:
    max_request_retries: 3
    retry_sleep_seconds: 0.5
    retry_backoff_initial_seconds: 1.0
    retry_backoff_max_seconds: 30.0
    retry_backoff_multiplier: 2.0
    retry_jitter_ratio: 0.30

# Locked raw-token allocation for the 762.5M corpus target:
#   task_code                    300.0M (39.3442623%)
#   educational_qa_mcq_general  187.5M (24.5901639%)
#   arithmetic                  112.5M (14.7540984%)
#   educational_qa_mcq_math     112.5M (14.7540984%)
#   factual_restraint            50.0M ( 6.5573770%)
# For smaller test TOKENS values, the same shares are used to derive estimated record counts.
# Calibrated from the corrected grounded_quality_smoke deduped output:
#   arithmetic=57, task_code=197, educational_qa_mcq_math=62,
#   educational_qa_mcq_general=108, factual_restraint=92.
# Re-run report-lengths after a larger validation run before final production execution.
mix:
  arithmetic:
    architecture: "grounded"
    share: 0.14754098360655737
    renderer_model: "__MODEL__"
    batch_size: __BATCH_SIZE__
    max_tokens: __MAX_TOKENS__
    avg_tokens_per_sample: 57
  task_code:
    architecture: "grounded"
    share: 0.39344262295081966
    renderer_model: "__MODEL__"
    batch_size: __BATCH_SIZE__
    max_tokens: __MAX_TOKENS__
    avg_tokens_per_sample: 197
  educational_qa_mcq_math:
    architecture: "grounded"
    share: 0.14754098360655737
    renderer_model: "__MODEL__"
    batch_size: __BATCH_SIZE__
    max_tokens: __MAX_TOKENS__
    avg_tokens_per_sample: 62
  educational_qa_mcq_general:
    architecture: "grounded"
    share: 0.24590163934426230
    renderer_model: "__MODEL__"
    batch_size: __BATCH_SIZE__
    max_tokens: __MAX_TOKENS__
    avg_tokens_per_sample: 108
  factual_restraint:
    architecture: "grounded"
    share: 0.06557377049180328
    renderer_model: "__MODEL__"
    batch_size: __BATCH_SIZE__
    max_tokens: __MAX_TOKENS__
    avg_tokens_per_sample: 92

validation:
  schema: true

dedup:
  mode: "exact"
  enable_exact: true
  enable_fuzzy: false
  fuzzy_enabled: false

export:
  license: mit
  push_to_hf: true
  hf_repo: "__HF_REPO__"
  private: false
  include_manifests: true

generation:
  batch_size: __BATCH_SIZE__
  parallel_requests: __CONCURRENCY__
  avg_tokens_per_sample: 100
  # Grounded generation targets estimated record counts and rounds to full batches.
  # There is intentionally no downstream tokenizer dependency in this repository.

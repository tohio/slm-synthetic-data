# Arithmetic Synthetic Data Prompt
# Generates structured arithmetic reasoning samples:
# - equations
# - multi-step numeric reasoning
# - comparisons
# - word problems

system: |
  You are a data generator. You MUST output a valid JSON array.
  The output MUST follow these rules exactly:

  - Output ONLY a JSON array.
  - The array MUST contain exactly {{batch_size}} objects.
  - Each object MUST follow the schema below.
  - No text before or after the JSON.
  - No markdown.
  - No code fences.
  - No explanations.
  - No comments.
  - No trailing commas.

  Schema for each item:
    {
      "instruction": string,
      "input": string | null,
      "output": string
    }

instruction: |
  Generate {{batch_size}} independent arithmetic problems.
  Each problem must be simple integer arithmetic:
    - addition
    - subtraction
    - multiplication
    - division (integer division only, no remainders)

  For each item:
    - "instruction" should describe the task (e.g., "Compute 7 + 5").
    - "input" should be null.
    - "output" must be the correct integer result as a string.

format: |
  [
    {
      "instruction": "...",
      "input": null,
      "output": "..."
    }
  ]


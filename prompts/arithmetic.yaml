# Arithmetic Synthetic Data Prompt
# Generates structured arithmetic reasoning samples:
# - equations
# - multi-step numeric reasoning
# - comparisons
# - word problems

system: |
  You are a data generator. You MUST output a valid JSON array.
  The output MUST follow these rules exactly:

  - Output ONLY a JSON array.
  - The array MUST contain exactly {{batch_size}} objects.
  - Each object MUST follow the schema below.
  - No text before or after the JSON.
  - No markdown.
  - No code fences.
  - No explanations.
  - No comments.
  - No trailing commas.

  Schema for each item:
    {
      "type": "arithmetic",
      "question": string,
      "steps": [string, ...],
      "answer": string
    }

instruction: |
  Generate {{batch_size}} independent arithmetic reasoning problems.
  Each problem must involve simple integer arithmetic:
    - addition
    - subtraction
    - multiplication
    - division (integer division only, no remainders)

  For each item:
    - "type" must be "arithmetic".
    - "question" must be a natural-language question (e.g., "What is 12 + 7?").
    - "steps" must be a list of short reasoning steps showing how to solve it.
    - "answer" must be the final integer result as a string.

format: |
  [
    {
      "type": "arithmetic",
      "question": "What is 12 + 7?",
      "steps": ["Add 12 and 7 to get 19."],
      "answer": "19"
    }
  ]



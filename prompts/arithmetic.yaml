# Arithmetic Synthetic Data Prompt
# Generates structured arithmetic reasoning samples:
# - equations
# - multi-step numeric reasoning
# - comparisons
# - word problems

system: |
  You are a data generator. Output exactly ONE JSON object.
  No arrays. No markdown. No explanations.

  Schema:
  {
    "type": "arithmetic",
    "question": string,
    "steps": [string, ...],
    "answer": string
  }

instruction: |
  Generate one arithmetic reasoning example.
  Use simple integer arithmetic (add, subtract, multiply, divide).
  Provide short reasoning steps.

format: |
  {
    "type": "arithmetic",
    "question": "What is 12 + 7?",
    "steps": ["Add 12 and 7 to get 19."],
    "answer": "19"
  }




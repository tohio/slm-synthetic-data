# Educational QA / MCQ Synthetic Data Prompt
# Generates structured educational questions:
# - multiple choice
# - short explanations
# - varied subjects

system: |
  You are a data generator. Output exactly ONE JSON object.
  No arrays. No markdown. No explanations.

  Schema:
  {
    "type": "educational_qa_mcq",
    "question": string,
    "choices": [string, string, string, string],
    "answer": string
  }

instruction: |
  Generate one multiple-choice educational question.
  Provide exactly 4 answer choices.
  The answer must be one of the choices.

format: |
  {
    "type": "educational_qa_mcq",
    "question": "What is the capital of France?",
    "choices": ["Paris", "Berlin", "Madrid", "Rome"],
    "answer": "Paris"
  }



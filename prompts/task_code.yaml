# Task-Code Synthetic Data Prompt
# Generates structured task decomposition + pseudocode samples.

system: |
  You are a data generator. Output exactly ONE JSON object.
  No arrays. No markdown. No explanations.

  Schema:
  {
    "type": "task_code",
    "task": string,
    "plan": [string, ...],
    "pseudocode": string
  }

instruction: |
  Generate one coding task.
  Include:
    - a natural-language task description
    - a step-by-step plan (array of short steps)
    - pseudocode solving the task

format: |
  {
    "type": "task_code",
    "task": "Write a function that returns the square of a number.",
    "plan": ["Define function square(x).", "Return x * x."],
    "pseudocode": "function square(x): return x * x"
  }



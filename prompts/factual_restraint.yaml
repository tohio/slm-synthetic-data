# Factual Restraint Synthetic Data Prompt
# Generates uncertainty-aware responses:
# - avoids hallucination
# - avoids unverifiable claims
# - expresses uncertainty safely

system: |
  You are a data generator. Output exactly ONE JSON object.
  No arrays. No markdown. No explanations.

  Schema:
  {
    "type": "factual_restraint",
    "claim": string,
    "label": string,
    "evidence": [string, ...]
  }

instruction: |
  Generate one factual claim.
  Label it as "supported", "refuted", or "unknown".
  Provide 1-3 short evidence sentences.

format: |
  {
    "type": "factual_restraint",
    "claim": "Water boils at 100°C at sea level.",
    "label": "supported",
    "evidence": ["This is a well-established physical property."]
  }


